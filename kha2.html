<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>function printTeamRoster(playerIds, playerNames, playerJerseyNumbers) {
  console.log("Danh sách cầu thủ:");
  for (let i = 0; i < playerIds.length; i++) {
    console.log(
      (i + 1) +
        ". " +
        playerIds[i] +
        " - " +
        playerNames[i] +
        " - Số áo: " +
        playerJerseyNumbers[i]
    );
  }
}

function updatePlayerNameAndJersey(playerIds, playerNames, playerJerseyNumbers, playerId, newName, newJerseyNumber) {
  let index = playerIds.indexOf(playerId);
  if (index !== -1) {
    playerNames[index] = newName;
    playerJerseyNumbers[index] = newJerseyNumber;
    return true;
  }
  return false;
}

let playerIds = ["P001", "P002", "P003", "P004", "P005"];
let playerNames = ["Nguyễn Văn A", "Trần Thị B", "Lê Văn C", "Phạm Văn D", "Hoàng Thị E"];
let playerJerseyNumbers = [10, 7, 8, 9, 11];

printTeamRoster(playerIds, playerNames, playerJerseyNumbers);

let idToUpdate = prompt("Nhập mã cầu thủ muốn cập nhật (ví dụ: P001):");
let newName = prompt("Nhập tên mới cho cầu thủ:");
let newJersey = parseInt(prompt("Nhập số áo mới (1-99):"));

let updated = updatePlayerNameAndJersey(playerIds, playerNames, playerJerseyNumbers, idToUpdate, newName, newJersey);

if (updated) {
  console.log("Cập nhật thành công!");
  printTeamRoster(playerIds, playerNames, playerJerseyNumbers);
} else {
  console.log("Không tìm thấy cầu thủ với mã này!");
}
</script>
</body>
</html>
